syntax = "proto3";

package santa.common.v1;

option go_package = "buf.build/gen/go/northpolesec/protos/protocolbuffers/go/common";
option objc_class_prefix = "SNTPB";

// Severity classifies how serious a fired detection signal is. The ordering
// matches the Severity type on sleigh's signal engine (UNKNOWN..CRITICAL).
enum Severity {
  SEVERITY_UNKNOWN = 0;
  SEVERITY_INFO = 1;
  SEVERITY_LOW = 2;
  SEVERITY_MEDIUM = 3;
  SEVERITY_HIGH = 4;
  SEVERITY_CRITICAL = 5;
}

// Signal is a named CEL detection rule evaluated against converted telemetry
// events as sleigh processes an export. Unlike filter_expressions, a signal is
// non-destructive: a match never drops or redacts the event, it is only
// reported back (see SignalReport) so the fleet can alert on suspicious
// activity. The expression is evaluated against the same `event` variable
// surface as filter_expressions and must return a boolean.
message Signal {
  // Stable identifier for the signal (e.g. "CRED-001"), echoed in the report.
  string name = 1;

  // Human-readable description of what the signal detects.
  string description = 2;

  Severity severity = 3;

  // CEL boolean expression over `event`. A true result is a match.
  string expression = 4;
}
