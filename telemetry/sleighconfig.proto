syntax = "proto3";

package santa.telemetry.v1;

option go_package = "buf.build/gen/go/northpolesec/protos/protocolbuffers/go/telemetry";
option objc_class_prefix = "SNTPB";

// SignedPost maps to the same message in syncv2. It's a separate message to
// allow the messages to be changed independently.
message SignedPost {
  // POST URL to send the signed form values and desired data. Use content type
  // multipart/form-data when making the request.
  string url = 1;

  // Signed values which authorize the POST request. Append the desired object
  // name to the "key" field.
  map<string, string> form_values = 2;
}

message SleighExportTelemetry {
  // The files to be exported, passed as a set of already open file descriptors.
  repeated int32 input_fds = 3;

  oneof export_config {
    SignedPost signed_post = 4;
  }

  // A set of CEL expressions to use to filter events as they are processed.
  // If an expression returns true the event is dropped. Expressions can also
  // redact fields instead of dropping.
  repeated string filter_expressions = 5;
}

// BinaryMetadata is computed by santa (via SNTFileInfo + MOLCodesignChecker) and
// carried in SleighBinaryUpload for sleigh's CEL upload filter to evaluate. In
// filter expressions the variable is `binary` (e.g. `binary.is_platform_binary`).
message BinaryMetadata {
  string path = 1;
  string signing_id = 2;
  string team_id = 3;
  string cdhash = 4;
  bool is_platform_binary = 5;
  int64 file_size = 6;
  string macho_type = 7;
}

// SleighBinaryUpload streams a single mach-o binary to a workshop-minted
// presigned POST. sleigh evaluates the CEL filter (against `metadata`) and the
// mach-o gate itself; a binary that matches a filter expression is dropped and
// not uploaded.
message SleighBinaryUpload {
  // The mach-o file to upload, passed as an already-open file descriptor.
  int32 input_fd = 1;

  // Presigned POST minted by workshop. The object key is baked into
  // form_values["key"]; sleigh uses the form values verbatim and never renames.
  SignedPost signed_post = 2;

  // Optional expected hash (from BinaryUploadRequest.sha256). When set, sleigh
  // verifies its computed hash against this value and aborts the upload before
  // the object commits on a mismatch.
  optional string expected_sha256 = 3;

  // Binary metadata computed by santa for the CEL filter to evaluate against.
  BinaryMetadata metadata = 4;

  // CEL expressions evaluated against `metadata`; if an expression returns true
  // the binary is dropped (not uploaded). Sourced by santa from the
  // BinaryUploadFilterExpressions config (MDM + sync state), so it is identical
  // for every invocation.
  repeated string filter_expressions = 5;
}

// SleighConfig contains the configuration data to be passed to Sleigh when
// Sleigh is started.
message SleighConfig {
  // The host_id for this host as sent up to Workshop.
  string host_id = 1;

  // The host_name for this host as sent up to Workshop.
  string host_name = 2;

  oneof command {
    SleighExportTelemetry export_telemetry = 3;
    SleighBinaryUpload binary_upload = 4;
  }
}
