syntax = "proto3";

package santa.telemetry.v1;

import "commands/v1.proto";
import "common/signals.proto";
import "google/protobuf/duration.proto";

option go_package = "buf.build/gen/go/northpolesec/protos/protocolbuffers/go/telemetry";
option objc_class_prefix = "SNTPB";

// SignedPost maps to the same message in syncv2. It's a separate message to
// allow the messages to be changed independently.
message SignedPost {
  // POST URL to send the signed form values and desired data. Use content type
  // multipart/form-data when making the request.
  string url = 1;

  // Signed values which authorize the POST request. Append the desired object
  // name to the "key" field.
  map<string, string> form_values = 2;
}

message SleighExportTelemetry {
  // The files to be exported, passed as a set of already open file descriptors.
  repeated int32 input_fds = 3;

  oneof export_config {
    SignedPost signed_post = 4;
  }

  // A set of CEL expressions to use to filter events as they are processed.
  // If an expression returns true the event is dropped. Expressions can also
  // redact fields instead of dropping.
  repeated string filter_expressions = 5;

  // Detection signals evaluated against every converted event. Signals are
  // non-destructive (they never drop or redact); each one that matches at least
  // one event is summarized in the SleighResponse signal report. Sourced by
  // santa from the synced telemetry_signals config, identical for every
  // invocation.
  repeated santa.common.v1.Signal signals = 6;
}

// BinaryMetadata is computed by santa (via SNTFileInfo + MOLCodesignChecker) and
// carried in SleighBinaryUpload for sleigh's CEL upload filter to evaluate. In
// filter expressions the variable is `binary` (e.g. `binary.is_platform_binary`).
message BinaryMetadata {
  string path = 1;
  string signing_id = 2;
  string team_id = 3;
  string cdhash = 4;
  bool is_platform_binary = 5;
  int64 file_size = 6;
  string macho_type = 7;
}

// SleighBinaryUpload streams a single mach-o binary to a workshop-minted
// presigned POST. sleigh evaluates the CEL filter (against `metadata`) and the
// mach-o gate itself; a binary that matches a filter expression is dropped and
// not uploaded.
message SleighBinaryUpload {
  // The mach-o file to upload, passed as an already-open file descriptor.
  int32 input_fd = 1;

  // Presigned POST minted by workshop. The object key is baked into
  // form_values["key"]; sleigh uses the form values verbatim and never renames.
  SignedPost signed_post = 2;

  // Optional expected hash (from BinaryUploadRequest.sha256). When set, sleigh
  // verifies its computed hash against this value and aborts the upload before
  // the object commits on a mismatch.
  optional string expected_sha256 = 3;

  // Binary metadata computed by santa for the CEL filter to evaluate against.
  BinaryMetadata metadata = 4;

  // CEL expressions evaluated against `metadata`; if an expression returns true
  // the binary is dropped (not uploaded). Sourced by santa from the
  // BinaryUploadFilterExpressions config (MDM + sync state), so it is identical
  // for every invocation.
  repeated string filter_expressions = 5;
}

// SleighInventoryScan runs a read-only package-inventory discovery sweep on
// the host and uploads per-ecosystem Parquet files inside a zip to a
// workshop-minted presigned POST. No package managers are executed and no
// resolution-time network requests are made; sleigh only reads on-disk
// lockfiles and install metadata. host_id / host_name come from the
// SleighConfig wrapper and are stamped on every emitted row.
message SleighInventoryScan {
  // Discovery profile.
  enum Profile {
    // Unset; sleigh treats this as PROFILE_BASELINE.
    PROFILE_UNKNOWN = 0;
    // Bounded known package/tool roots (the default fleet scan).
    PROFILE_BASELINE = 1;
    // Configured developer/project roots.
    PROFILE_PROJECT = 2;
    // Incident-response exposure scan; requires explicit roots and may
    // include user home directories.
    PROFILE_DEEP = 3;
  }

  // Package ecosystem identifiers, matching sleigh's emitted ecosystem
  // strings.
  enum Ecosystem {
    ECOSYSTEM_UNKNOWN = 0;
    ECOSYSTEM_NPM = 1;
    ECOSYSTEM_PYPI = 2;
    ECOSYSTEM_GO = 3;
    ECOSYSTEM_RUBYGEMS = 4;
    ECOSYSTEM_PACKAGIST = 5;
    ECOSYSTEM_MCP = 6;
    ECOSYSTEM_EDITOR_EXTENSION = 7;
    ECOSYSTEM_BROWSER_EXTENSION = 8;
  }

  // Discovery profile. Unset (PROFILE_UNKNOWN) is treated as
  // PROFILE_BASELINE, the default fleet scan.
  Profile profile = 1;

  // Filesystem roots to scan. Required for PROFILE_DEEP; optional for
  // PROFILE_BASELINE and PROFILE_PROJECT (in which case profile-curated
  // defaults are used). Unrelated to running the binary as root.
  repeated string roots = 2;

  // Additional directory names or suffix paths to exclude during walking,
  // on top of the built-in walker excludes.
  repeated string excludes = 3;

  // Restrict scanning to these ecosystems. When empty all supported
  // ecosystems run.
  repeated Ecosystem ecosystems = 4;

  // macOS only: when true, baseline/project per-user roots are expanded
  // across every real /Users/<name>/ home (useful when sleigh runs as a
  // root LaunchDaemon). Cannot be combined with PROFILE_DEEP or with
  // operator-supplied roots. No effect on Linux.
  bool all_users = 5;

  // Per-file read cap in bytes. 0 falls back to sleigh's built-in default.
  int64 max_file_size = 6;

  // Wall-clock budget for the whole scan. Zero / unset means unbounded.
  google.protobuf.Duration max_duration = 7;

  // Concurrent file parsers. 0 falls back to sleigh's built-in default.
  int32 concurrency = 8;

  // Path to a JSON exposure catalog file or directory of *.json catalogs
  // (merged non-recursively). Matches emit record_type=finding alongside
  // package records.
  string exposure_catalog_path = 9;

  // Per-catalog-file read cap in bytes. 0 falls back to sleigh's
  // built-in default.
  int64 max_catalog_size = 10;

  // Suppress package records while still emitting findings and the
  // scan_summary. Requires exposure_catalog_path to be set.
  bool findings_only = 11;

  // Presigned POST minted by workshop. The object key is built from
  // form_values["key"] suffixed by the run's generated filename.
  SignedPost signed_post = 12;
}

// SleighConfig contains the configuration data to be passed to Sleigh when
// Sleigh is started.
message SleighConfig {
  // The host_id for this host as sent up to Workshop.
  string host_id = 1;

  // The host_name for this host as sent up to Workshop.
  string host_name = 2;

  oneof command {
    SleighExportTelemetry export_telemetry = 3;
    SleighBinaryUpload binary_upload = 4;
    SleighInventoryScan inventory_scan = 5;
  }
}

// SignalReport summarizes how a single detection signal matched over the course
// of an export. One entry is emitted per signal that fired at least once.
message SignalReport {
  // The Signal.name that fired.
  string name = 1;

  santa.common.v1.Severity severity = 2;

  // The Signal.description, echoed for convenience so alerting does not need to
  // re-join against the synced config.
  string description = 3;

  // Total number of events that matched this signal across the export.
  uint64 match_count = 4;

  // Distinct converted event types the signal matched on (e.g. "execution"),
  // sorted.
  repeated string event_types = 5;

  // The source events that triggered this signal. Many signals will trigger on
  // a single event but this field is repeated to allow for signals that join
  // across related events.
  repeated SantaMessage events = 6;
}

// SleighExportTelemetryResponse is the result of an export_telemetry command.
message SleighExportTelemetryResponse {
  // One entry per detection signal that fired at least once, sorted by name.
  repeated SignalReport signal_reports = 1;
}

// SleighResponse is written (serialized) to stdout by sleigh and read by santad.
// The populated field mirrors the SleighConfig.command that was run.
message SleighResponse {
  oneof response {
    SleighExportTelemetryResponse export_telemetry = 1;
    santa.commands.v1.BinaryUploadResponse binary_upload = 2;
  }
}
