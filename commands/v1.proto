syntax = "proto3";

package santa.commands.v1;

option go_package = "buf.build/gen/go/northpolesec/protos/protocolbuffers/go/commands";

message RunningProcess {
  int32 pid = 1;
  int32 pidversion = 2;
  string boot_session_uuid = 3 [json_name = "boot_session_uuid"];
}

message KillRequest {
  oneof process {
    RunningProcess running_process = 1 [json_name = "running_process"];
    string cdhash = 2;
    string signing_id = 3 [json_name = "signing_id"];
    string team_id = 4 [json_name = "team_id"];
  }
}

message KillResponse {
  enum Error {
    ERROR_UNSPECIFIED = 0;
    ERROR_INTERNAL = 1;
    ERROR_UNKNOWN_PROCESS_TYPE = 2;
    ERROR_INVALID_RUNNING_PROCESS = 3;
    ERROR_INVALID_CDHASH = 4;
    ERROR_INVALID_SIGNING_ID = 5;
    ERROR_INVALID_TEAM_ID = 6;
    ERROR_LIST_PIDS = 7;
    ERROR_TIMEOUT = 8;
  }

  enum KillError {
    KILL_ERROR_UNSPECIFIED = 0;
    KILL_ERROR_INTERNAL = 1;
    KILL_ERROR_OPERATION_NOT_PERMITTED = 2;
    KILL_ERROR_NO_SUCH_PROCESS = 3;
    KILL_ERROR_INVALID_ARGUMENT = 4;
    KILL_ERROR_INVALID_TARGET = 5;
    KILL_ERROR_BOOT_SESSION_MISMATCH = 6;
  }

  message Process {
    int32 pid = 1;
    int32 pidversion = 2;
    optional KillError error = 3;
  }

  optional Error error = 1;
  repeated Process processes = 2;
}

// Command to request Santa's bundle service inventory a specific directory and
// upload it via the sync protocol.
message EventUploadRequest {
  string path = 1;
}

// Events are sent up via the sync protocol so this just signals that the
// command succeeded.
message EventUploadResponse {
  enum Error {
    ERROR_UNSPECIFIED = 0;
    ERROR_INVALID_PATH = 1;
    ERROR_INTERNAL = 2;
  }
  optional Error error = 1;
}

// Command message sent to santa.host.<deviceid>.commands
message SantaCommandRequest {
  // Nonce
  string uuid = 1;

  // timestamp in second to prevent replays
  int64 issued_at = 2;

  // HMAC of the uuid concatenated with the command values.
  // This should be HMAC(uuid + issued_at + command bytes)
  //
  // To calculate this copy the value, set it to nil in the message and then
  // marshal the message and compare.
  bytes hmac = 3;

  oneof command {
    PingRequest ping = 10;
    KillRequest kill = 11;
    EventUploadRequest event_upload = 12;
  }
}

message SantaCommandResponse {
  enum Error {
    ERROR_UNSPECIFIED = 0;
    ERROR_INVALID_DATA = 1;
    ERROR_DESERIALIZATION = 2;
    ERROR_INVALID_UUID = 3;
    ERROR_UNKNOWN_REQUEST_TYPE = 4;
    ERROR_COMMAND_DISABLED = 5;
  }

  optional Error error = 1;

  oneof result {
    PingResponse ping = 2;
    KillResponse kill = 3;
    EventUploadResponse event_upload = 4;
  }
}

// An empty message just to send request a ping
message PingRequest {}

// An empty message just to respond
message PingResponse {}

// QueuedCommand is one command instance assigned to the host for execution. The
// agent runs the typed request from the `command` oneof and echoes `command_id`
// back in every CommandResult it posts for this command.
message QueuedCommand {
  // Opaque identifier the agent echoes back unchanged in CommandResult.
  // Required.
  int64 command_id = 1;

  // The typed request to execute.
  oneof command {
    KillRequest kill = 2;
    EventUploadRequest event_upload = 3;
  }
}

// CommandResult is the agent's report about one QueuedCommand. The flow is
// two-phase: the agent posts DELIVERED first (ack-only, no payload), then
// COMPLETE with the typed response once execution finishes. Fast commands may
// short-circuit straight to COMPLETE in a single post. REJECTED / FAILED are
// terminal failure variants (no payload).
message CommandResult {
  // Echoed back from QueuedCommand.command_id. Required.
  int64 command_id = 1;

  // What the agent decided about this command. Required.
  enum HostStatus {
    HOST_STATUS_UNSPECIFIED = 0;
    // Intermediate ack: the agent received the command and will execute it. The
    // `result` oneof MUST NOT be set; the typed payload arrives later as a
    // separate COMPLETE post.
    HOST_STATUS_DELIVERED = 1;
    // The agent received the command but refused to run it (e.g. the command
    // type is disabled in the agent's configuration). No `result`.
    HOST_STATUS_REJECTED = 2;
    // Catch-all for unexpected agent-side failures dispatching the command
    // before it ran (deserialization, internal errors, etc.). No `result`.
    HOST_STATUS_FAILED = 3;
    // The agent ran the command. The matching `result` oneof variant carries
    // the typed per-command response. Required for this status.
    HOST_STATUS_COMPLETE = 4;
  }
  HostStatus host_status = 2;

  // Optional free-text error context.
  string error_message = 3;

  // The agent's typed response, present iff host_status = COMPLETE. The variant
  // must match the QueuedCommand variant the agent received.
  oneof result {
    KillResponse kill = 4;
    EventUploadResponse event_upload = 5;
  }
}
